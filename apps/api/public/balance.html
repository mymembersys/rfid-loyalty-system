<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta name="robots" content="noindex" />
<title>Stamp balance</title>
<style>
  :root {
    --primary: #1F4E79;
    --accent:  #2E75B6;
    --bg:      #f5f7fb;
    --card:    #ffffff;
    --text:    #0f172a;
    --muted:   #6b7280;
    --border:  #e5e9f2;
    --ok:      #16a34a;
    --err:     #dc2626;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
    background:
      radial-gradient(900px 500px at 0% 0%,   color-mix(in srgb, var(--primary) 14%, transparent), transparent 60%),
      radial-gradient(700px 500px at 100% 100%, color-mix(in srgb, var(--accent)  14%, transparent), transparent 60%),
      var(--bg);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .card {
    width: 100%; max-width: 380px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: 0 20px 50px rgba(15, 23, 42, .08);
    overflow: hidden;
  }
  .head {
    display: flex; align-items: center; gap: 12px;
    padding: 18px 20px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
    color: #fff;
  }
  .head img, .head .glyph {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: rgba(255,255,255,.15);
    object-fit: contain;
  }
  .head h1 {
    margin: 0; font-size: 17px; font-weight: 700; letter-spacing: -0.01em;
  }
  .head small { display: block; opacity: .85; font-weight: 400; font-size: 12px; }

  .body { padding: 20px; }
  .greet {
    font-size: 22px; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 4px;
  }
  .meta {
    color: var(--muted); font-size: 13px; margin: 0 0 14px;
  }
  .member-no {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    background: #eef1ff;
    color: var(--primary);
    padding: 2px 8px; border-radius: 999px;
    font-size: 12px; font-weight: 600;
  }

  .balance-row { display: grid; gap: 10px; margin-bottom: 14px; }
  .bal {
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .bal .name { text-transform: capitalize; font-size: 14px; color: var(--muted); }
  .bal .val { font-size: 28px; font-weight: 800; color: var(--primary); letter-spacing: -0.02em; }
  .bal .sub { font-size: 11.5px; color: var(--muted); }

  .empty {
    text-align: center; color: var(--muted); padding: 18px 0;
    border: 1px dashed var(--border); border-radius: 12px;
  }
  .err {
    color: var(--err); background: #fef2f2; border: 1px solid #fecaca;
    border-radius: 12px; padding: 12px 14px; font-size: 14px;
  }

  .foot {
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    text-align: center;
    font-size: 11.5px; color: var(--muted);
  }
  .foot .stamp { font-family: ui-monospace, monospace; font-size: 11px; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; border: 1px solid transparent; }
  .badge-active      { background: #ecfdf5; color: var(--ok); border-color: rgba(22,163,74,.2); }
  .badge-suspended,
  .badge-blacklisted { background: #fef2f2; color: var(--err); border-color: rgba(220,38,38,.2); }
  .badge-inactive    { background: #f1f5f9; color: #475569; border-color: var(--border); }

  /* print */
  @media print {
    body {
      background: #fff !important;
      min-height: 0 !important;
      padding: 0 !important;
    }
    .card { box-shadow: none !important; border-color: #999 !important; }
    .head { background: #fff !important; color: #000 !important; }
    .head .glyph, .head img { background: #ddd !important; }
    @page { margin: 12mm; }
  }
</style>
</head>
<body>
  <div class="card" id="loading">
    <div class="body">
      <p class="meta" style="margin: 0; text-align: center">Loading your balance…</p>
    </div>
  </div>

  <div class="card" id="card" style="display:none">
    <div class="head" id="head">
      <span class="glyph" id="glyph"></span>
      <div>
        <h1 id="brand">RFID Loyalty</h1>
        <small id="updated"></small>
      </div>
    </div>
    <div class="body">
      <h2 class="greet" id="greet"></h2>
      <p class="meta">
        <span class="member-no" id="memberNo"></span>
        <span id="memberStatus"></span>
      </p>
      <div class="balance-row" id="balances"></div>
      <p class="meta" style="margin: 0">
        Show this screen at any branch counter to redeem your rewards.
      </p>
    </div>
    <div class="foot">
      Powered by <span id="footBrand">RFID Loyalty</span> · <span class="stamp" id="footStamp"></span>
    </div>
  </div>

  <div class="card" id="errorCard" style="display:none">
    <div class="body">
      <div class="err" id="errorMsg">This balance link is invalid or has expired.</div>
      <p class="meta" style="margin-top: 12px">Please ask a staff member to scan your card again.</p>
    </div>
  </div>

  <script src="/balance.js"></script>
</body>
</html>
